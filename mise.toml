[tools]
actionlint = "1.7.12"
cocogitto = "7.0.0"
gitleaks = "8.30.1"
goreleaser = "2.15.2"
hadolint = "2.14.0"
shellcheck = "0.11.0"
syft = "1.42.4"
trivy = "0.69.3"

[hooks]
enter = { task = "setup" }

[tasks.setup]
description = "Prime the base image when Docker is available"
run = "docker info >/dev/null 2>&1 && (docker image inspect dhi.io/debian-base:trixie-debian13-dev@sha256:9415967aa0ed8adea8b5c048994259d1982026dca143d0303c7bbe0e11ed67d3 >/dev/null 2>&1 || docker pull dhi.io/debian-base:trixie-debian13-dev@sha256:9415967aa0ed8adea8b5c048994259d1982026dca143d0303c7bbe0e11ed67d3) || true"

[tasks.commit]
# tools.cocogitto = "7.0.0"
description = "Create a conventional commit"
run = "cog commit"

[tasks."lint:docker"]
# tools.hadolint = "2.14.0"
description = "Lint the Dockerfile"
run = "hadolint Dockerfile"

[tasks."lint:actions"]
# tools.actionlint = "1.7.12"
description = "Lint GitHub Actions workflows"
run = "actionlint"

[tasks.lint]
description = "Run all lint checks"
depends = ["lint:docker", "lint:actions"]

[tasks.build]
description = "Build devcontainer image"
run = "docker build -t localhost/devcontainer:latest -f ./Dockerfile ."

[tasks.test]
description = "Run container smoke tests"
depends = ["build"]
run = "docker run --rm localhost/devcontainer:latest fish -lc 'test \"$(id -un)\" = dev && test \"$HOME\" = /home/dev && command -v fish >/dev/null && command -v mise >/dev/null && command -v sudo >/dev/null && command -v tailscale >/dev/null'"

[tasks.audit]
# tools.trivy = "0.69.3"
description = "Audit the built image for vulnerabilities"
depends = ["build"]
run = "trivy image --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 localhost/devcontainer:latest"

[tasks.secrets]
# tools.gitleaks = "8.30.1"
description = "Scan the repository for secrets"
run = "gitleaks dir ."

[tasks.commits]
# tools.cocogitto = "7.0.0"
description = "Enforce conventional commits"
run = "cog check"

[tasks."release:version"]
# tools.cocogitto = "7.0.0"
description = "Create the next version and tag"
run = "cog bump --auto"

[tasks."release:check"]
# tools.goreleaser = "2.15.2"
description = "Validate GoReleaser configuration"
run = "goreleaser check"

[tasks."release:verify"]
# tools.goreleaser = "2.15.2"
description = "Verify release pipeline from a clean worktree"
run = "tmp=$(mktemp -d) && trap 'git worktree remove --force \"$tmp\"' EXIT && git worktree add --quiet --detach \"$tmp\" HEAD && (cd \"$tmp\" && goreleaser release --snapshot --clean)"

[tasks."release:publish"]
# tools.goreleaser = "2.15.2"
description = "Publish the current tagged release"
depends = ["check", "release:verify"]
run = "goreleaser release --clean"

[tasks.release]
description = "Publish the current tagged release"
depends = ["release:publish"]

[tasks.check]
description = "Run project checks"
depends = ["setup", "lint", "test", "audit", "secrets", "commits", "release:check"]
