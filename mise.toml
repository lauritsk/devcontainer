[env]
HK_MISE = 1

[tools]
actionlint = "1.7.12"
cocogitto = "7.0.0"
cosign = "3.0.6"
goreleaser = "2.15.4"
hadolint = "2.14.0"
hk = "1.44.3"
pkl = "0.31.1"
rumdl = "0.1.94"
shellcheck = "0.11.0"
shfmt = "3.13.1"
syft = "1.44.0"
tombi = "0.11.5"
trivy = "0.70.0"

[hooks]
postinstall = "hk install --mise"

[tasks.install]
description = "Prepare local project environment"
run = "true"

[tasks.fix]
description = "Run hk-managed fixers across the repository"
run = "hk fix --all"

[tasks.lint]
description = "Run hk-managed checks across the repository"
run = "hk check --all"

[tasks.build]
description = "Build devcontainer image"
run = "docker build -t localhost/devcontainer:latest -f ./Dockerfile ."

[tasks.test]
description = "Run container smoke tests"
depends = ["build"]
run = "docker run --rm localhost/devcontainer:latest fish -lc 'test \"$(id -un)\" = dev && test \"$HOME\" = /home/dev && command -v fish >/dev/null && command -v mise >/dev/null && command -v sudo >/dev/null && command -v tailscale >/dev/null'"

[tasks.audit]
description = "Audit built image and repository files"
depends = ["build"]
run = "trivy image --pkg-types os --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 localhost/devcontainer:latest && trivy fs --scanners vuln,misconfig,secret --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 ."

[tasks.check]
description = "Run project checks"
depends = ["lint", "test", "audit"]

[tasks."release:bump"]
description = "Bump project version"
run = "cog bump --auto"

[tasks."release:publish"]
description = "Publish release"
run = "goreleaser release --clean"
