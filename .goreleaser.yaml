# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

builds:
  - skip: true

dockers_v2:
  - id: devcontainer
    dockerfile: Dockerfile
    images:
      - ghcr.io/lauritsk/devcontainer
    tags:
      - "{{ .Version }}"
      - "{{ if and (not .IsSnapshot) (not .Prerelease) }}latest{{ end }}"
    extra_files:
      - etc
    labels:
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.description: "Debian devcontainer image with fish, mise, sudo, and tailscale"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.source: "{{ .GitURL }}"
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.version: "{{ .Version }}"
    platforms:
      - linux/amd64
      - linux/arm64
    sbom: true

docker_signs:
  - ids:
      - devcontainer
    artifacts: all
    cmd: cosign
    args:
      - sign
      - "${artifact}@${digest}"
      - --yes

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
